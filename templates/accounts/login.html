{% extends "base.html" %}
{% block title %}Sign in · Accounting{% endblock %}
{% block nav %}{% endblock %}
{% block content %}
  <div class="mx-auto flex min-h-[70vh] max-w-md flex-col justify-center">
    <div class="rounded-2xl bg-white p-8 shadow-sm ring-1 ring-slate-200">
      <div class="mb-6 flex items-center gap-3">
        <div class="grid h-10 w-10 place-items-center rounded-lg bg-brand-600 font-bold text-white">A</div>
        <div>
          <h1 class="text-lg font-semibold text-slate-900">Accounting</h1>
          <p class="text-sm text-slate-500">Sign in to continue</p>
        </div>
      </div>

      {% if form.non_field_errors %}
        <div class="mb-4 rounded-md border border-rose-200 bg-rose-50 px-3 py-2 text-sm text-rose-700">
          {{ form.non_field_errors }}
        </div>
      {% endif %}

      <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
          <label for="id_username" class="block text-sm font-medium text-slate-700">Username</label>
          <input type="text" name="username" id="id_username" autocomplete="username" required
                 class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 sm:text-sm">
        </div>
        <div>
          <label for="id_password" class="block text-sm font-medium text-slate-700">Password</label>
          <input type="password" name="password" id="id_password" autocomplete="current-password" required
                 class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 sm:text-sm">
        </div>
        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit"
                class="inline-flex w-full items-center justify-center rounded-md bg-brand-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:ring-offset-2">
          Sign in
        </button>
      </form>
    </div>
  </div>
{% endblock %}
