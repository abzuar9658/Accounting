{# Reusable page header. Pass `title`, optional `subtitle`, optional `actions` block via the calling template. #}
<div class="mb-6 flex flex-wrap items-end justify-between gap-4">
  <div>
    <h1 class="text-2xl font-semibold text-slate-900">{{ title }}</h1>
    {% if subtitle %}<p class="mt-1 text-sm text-slate-500">{{ subtitle }}</p>{% endif %}
  </div>
  {% if actions_html %}<div class="flex items-center gap-2">{{ actions_html|safe }}</div>{% endif %}
</div>
