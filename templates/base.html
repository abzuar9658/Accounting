{% load static %}
<!doctype html>
<html lang="en" class="h-full bg-slate-50">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Accounting{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui'] },
          colors: {
            brand: {
              50: '#eef4ff', 100: '#dbe7ff', 200: '#bccfff', 300: '#8eaeff',
              400: '#5d85ff', 500: '#3a60f5', 600: '#2545db', 700: '#1d36ad',
              800: '#1c318a', 900: '#1c2e6f',
            },
          },
        },
      },
    };
  </script>
</head>
<body class="h-full font-sans text-slate-800 antialiased">
  <div class="min-h-full">
    {% block nav %}
    <nav class="bg-white border-b border-slate-200">
      <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
        <div class="flex h-16 items-center justify-between">
          <div class="flex items-center gap-2">
            <div class="h-8 w-8 rounded-lg bg-brand-600 grid place-items-center text-white font-bold">A</div>
            <span class="font-semibold text-slate-900">Accounting</span>
          </div>
        </div>
      </div>
    </nav>
    {% endblock %}

    <main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
      {% if messages %}
        <div class="mb-6 space-y-2">
          {% for m in messages %}
            <div class="rounded-md border border-slate-200 bg-white px-4 py-3 text-sm shadow-sm">{{ m }}</div>
          {% endfor %}
        </div>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
